<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zmrzlio</title>
    <link href="/themes/lux-bootstrap.min.css" rel="stylesheet">
    <link href="../style.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico">

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >
    <script>
      window.onload = function () {
        // Při načtení stránky doplníme hash do src iframu
        const frame = window.parent.document.querySelector("iframe");
        const hash = window.parent.location.hash;

        if (hash && frame) frame.src = `components/header.html${hash}`;
      };
    </script>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Zavírací tlačítko pro fullscreen menu
      document.addEventListener("click", function (e) {
        const navCollapse = document.getElementById("mainNav");
        // Klik na ::before (zavírací X) - detekujeme klik v pravém horním rohu
        if (navCollapse.classList.contains("show")) {
          const rect = navCollapse.getBoundingClientRect();
          if (e.clientX > rect.right - 60 && e.clientY < rect.top + 60) {
            const bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
            if (bsCollapse) bsCollapse.hide();
          }
        }
      });

      // Zavřít menu po kliknutí na odkaz
      document.querySelectorAll("#mainNav .nav-link").forEach((link) => {
        link.addEventListener("click", () => {
          const navCollapse = document.getElementById("mainNav");
          const bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
          if (bsCollapse) bsCollapse.hide();
        });
      });
    </script>
  </body>
</html>
