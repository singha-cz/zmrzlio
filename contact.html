<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Kde nás najdete? Adresa našich 
zmrzlináren, otevírací doba a kontaktní 
údaje společnosti Zmrzlio. Těšíme se na vaši 
návštěvu. "
    >
    <title>Kontakt | Zmrzlio</title>
    <link href="/themes/lux-bootstrap.min.css" rel="stylesheet">
    <link
      href="./style.css"
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    >
    <noscript><link href="./style.css" rel="stylesheet">/></noscript>
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    >
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      >
    </noscript>
  </head>
  <body>
    <site-header role="navigation"></site-header>
    <script type="module" src="/components/header-component.js"></script>

    <div class="container my-5" role="main">
      <h1>Napište nám…</h1>
      <form class="row g-3">
        <div class="col-md-6">
          <label for="jmeno" class="form-label">Jméno</label>
          <input type="text" class="form-control" id="jmeno">
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email">
        </div>
        <div class="col-12">
          <label for="adresa" class="form-label">Adresa</label>
          <input type="text" class="form-control" id="adresa">
        </div>
        <div class="col-md-6">
          <label for="mesto" class="form-label">Město</label>
          <input type="text" class="form-control" id="mesto">
        </div>
        <div class="col-md-2">
          <label for="psc" class="form-label">PSČ</label>
          <input type="text" class="form-control" id="psc">
        </div>
        <div class="col-md-4">
          <label for="stat" class="form-label">Stát</label>
          <select id="stat" class="form-select">
            <option>Česko</option>
            <option>Slovensko</option>
            <option>Jiné</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Pohlaví</label><br>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="pohlavi"
              id="muz"
              value="muz"
            >
            <label class="form-check-label" for="muz">Muž</label>
          </div>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="pohlavi"
              id="zena"
              value="zena"
            >
            <label class="form-check-label" for="zena">Žena</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="souhlas">
            <label class="form-check-label" for="souhlas">
              Souhlasím se zpracováním osobních údajů
            </label>
          </div>
        </div>
        <div class="col-12">
          <label for="poznamka" class="form-label"
            >Potřebujete nám sdělit ještě něco?</label
          >
          <textarea id="poznamka" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12 justify-content-end d-flex">
          <button type="submit" class="btn btn-primary btn-mobile-full">
            Odeslat
          </button>
        </div>
      </form>
    </div>

    <footer class="bg-primary text-light text-center py-3 mt-5">
      <h2>Pohlazení na jazyku</h2>
      <small
        >&copy; 2025 |
        <a href="../index.html" target="_parent" class="text-light"
          >Zmrzlio.cz</a
        >
        |
        <a href="../about-us.html" target="_parent" class="text-light"
          >Více o nás</a
        ></small
      >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
